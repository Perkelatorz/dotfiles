# MangoHud — global default overlay. Per-game overrides go in a game's own
# MangoHud.conf or via MANGOHUD_CONFIG=... in its launch options.
# Enable per game with:  mangohud %command%   (or gamemoderun mangohud %command%)
# Docs: https://github.com/flightlessmania/MangoHud

# --- Toggles (keys) ---
toggle_hud=Shift_R+F12
toggle_logging=Shift_L+F2
reload_cfg=Shift_L+F4

# --- Layout ---
position=top-left
font_size=20
background_alpha=0.35
round_corners=6
table_columns=3

# --- GPU ---
gpu_stats
gpu_temp
gpu_core_clock
gpu_mem_clock
gpu_power
vram

# --- CPU ---
cpu_stats
cpu_temp
cpu_power
core_load
ram

# --- Framerate ---
fps
frametime
frame_timing
gpu_load_change
cpu_load_change

# --- Extra info ---
engine_version
vulkan_driver
resolution
gamemode
vsync

# --- Optional: uncomment to log 1% / 0.1% lows to ~/mangohud-*.csv ---
# output_folder=/home/perkelator
# log_duration=60
# fps_limit=0
