# --- Core Components ---
# exec-once = waybar
exec-once = ~/.config/scripts/launch-quickshell.sh &
exec-once = hypridle
exec-once = systemctl --user start hyprpolkitagent
exec-once = awww-daemon
exec-once = swaync

# --- Plugins & Apps ---
exec-once = hyprpm reload -n & discord & spotify
# SSH agent lives in Bitwarden (see environment.d/ssh-agent.conf) — must be
# running (and unlocked) for git/ssh to see keys.
exec-once = bitwarden

# --- Clipboard ---
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = wl-clip-persist --clipboard regular
