# Bitwarden desktop is the SSH agent (enable "SSH agent" in its settings).
# Set unconditionally: if Bitwarden isn't running yet, ssh silently falls back
# to ~/.ssh keys; once it starts, the socket is picked up with no re-login.
# Picked up by the systemd user session (uwsm/Hyprland and everything under it).
#
# Bitwarden's own default socket path is $HOME/.bitwarden-ssh-agent.sock, which
# does NOT match SSH_AUTH_SOCK below — so ssh looked in the wrong place and every
# auth failed with "Permission denied (publickey)". BITWARDEN_SSH_AUTH_SOCK tells
# Bitwarden to create the socket at the runtime-dir path instead, so both agree.
# (Takes effect after Bitwarden restarts under a fresh session.)
BITWARDEN_SSH_AUTH_SOCK=$XDG_RUNTIME_DIR/.bitwarden-ssh-agent.sock
SSH_AUTH_SOCK=$XDG_RUNTIME_DIR/.bitwarden-ssh-agent.sock
