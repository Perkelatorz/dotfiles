# -----------------------------------------------------------------------------
# Gaming tuning — sourced from hyprland.conf.
#
# Safe to keep sourced on every machine: the tearing/VRR settings are inert
# until a fullscreen game actually runs, and the window rules only match game
# windows (Steam app IDs, gamescope, Proton .exe). Nothing here affects normal
# desktop use.
#
# Install the package side with:  yadm config local.gaming true && yadm bootstrap
#
# Recommended Steam launch options (per game → Properties → Launch Options):
#   gamemoderun mangohud %command%              # perf governor + FPS/temp overlay
#   gamescope -f --hdr-enabled -- %command%     # HDR / integer scaling wrapper
#   __GL_SYNC_TO_VBLANK=0 mangohud %command%    # let the immediate rule tear (NVIDIA)
# Toggle the MangoHud overlay in-game with Right Shift + F12.
# -----------------------------------------------------------------------------

# --- Tearing: lowers input latency in fullscreen games. Only takes effect for
#     windows carrying the `immediate` rule below (and with in-game vsync off). ---
general {
    allow_tearing = true
}

# --- VRR / G-Sync / FreeSync: 2 = fullscreen apps only. Full-screen games get
#     variable refresh; the desktop stays fixed (avoids panel flicker some
#     monitors show when VRR is always on). Use 1 for always-on, 0 to disable. ---
misc {
    vrr = 2
}

# --- Per-game window rules ---------------------------------------------------
# Matches: steam_app_<id>  (native + Proton games launched from Steam)
#          gamescope       (the gamescope micro-compositor)
#          *.exe           (Proton/Wine windows launched outside Steam)
windowrule {
    name = game-performance
    match:class = ^(steam_app_\d+|gamescope|.*\.exe)$
    immediate = true          # allow tearing for this window (needs allow_tearing)
    no_blur = true            # don't waste GPU blurring an opaque game
    no_shadow = true
    no_anim = true            # skip open/close animation for games
    idle_inhibit = fullscreen # don't blank/lock the screen while fullscreen
}

# Add launchers/edge-case titles as you meet them, e.g.:
# windowrule { name = game-heroic; match:class = ^(heroic|lutris)$; idle_inhibit = fullscreen }

# --- HDR (opt-in, per monitor) -----------------------------------------------
# Color management is already enabled globally in 0.55 (render:cm_enabled and
# render:cm_auto_hdr default to 1), so there is nothing to switch on here. HDR
# is chosen per display, in monitors.conf (that file is machine-local, generated
# by nwg-displays). To put the HDR panel (DP-3, the 4K240 here) into HDR, add
# `bitdepth, 10` and `cm, hdr` to ITS line — all on one line, no continuation:
#
#   monitor = DP-3, 3840x2160@239.99, 1440x1440, 1.33, bitdepth, 10, cm, hdr, sdrbrightness, 1.2, sdrsaturation, 1.0
#
#   cm             hdr | hdredid | auto | wide | srgb   (hdredid = trust panel EDID)
#   sdrbrightness  brightness of SDR content on the HDR canvas (~1.0–1.5)
#   sdrsaturation  saturation of SDR content (1.0 = neutral)
#
# Then launch HDR-capable games through gamescope:
#   gamescope -f --hdr-enabled -- %command%
# Confirm the panel actually switched with:
#   hyprctl monitors | grep -iE 'currentFormat|activelyTearing'
